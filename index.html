<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bầu Cua - Cỗ Máy In Tiền</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff9a00;
            --primary-gradient: linear-gradient(135deg, #ff9a00 0%, #e67e22 100%);
            --bg: #0a0a0f;
            --surface: rgba(26, 26, 36, 0.7);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-secondary: #8e8ea9;
            --accent: #26de81;
            --danger: #fc5c65;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, #ff9a0020 0px, transparent 50%),
                              radial-gradient(at 98% 100%, #1a1a3a 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 480px;
        }

        h2 {
            font-size: 1.85rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .balance-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 10px 20px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .balance-card .label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-card .value {
            color: var(--primary);
            font-size: 1.15rem;
            font-weight: 800;
        }

        /* KHU VỰC BÁT ĐĨA 8D - 3D */
        .eight-d-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
        }

        .plate-base {
            width: 220px;
            height: 55px;
            background: #111;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 2px 8px #333;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .bowl-top {
            width: 170px;
            height: 85px;
            background: linear-gradient(145deg, #222, #111);
            border-radius: 90px 90px 15px 15px;
            box-shadow: inset 0 6px 15px rgba(255,255,255,0.1), 0 -5px 15px rgba(255,153,0,0.2);
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -30px;
            position: relative;
            z-index: 5;
            transition: transform 0.5s ease;
        }

        .bowl-top::after {
            content: '';
            position: absolute;
            width: 160px;
            height: 75px;
            border-radius: 80px 80px 10px 10px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            top: 2px;
            left: 3px;
        }

        .dice-area {
            display: flex;
            gap: 10px;
            position: absolute;
            z-index: 2;
            top: -25px;
        }

        .dice {
            width: 46px;
            height: 46px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 -4px 5px #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 1px solid #ccc;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 16px 8px;
            border-radius: 18px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            padding: 2px;
            background: var(--primary-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.15);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card.active {
            transform: translateY(-3px) scale(1.02);
            background: rgba(230, 126, 34, 0.18);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.3);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .card:hover .icon, .card.active .icon {
            transform: scale(1.15) rotate(5deg);
        }

        .name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
        }

        .control-panel {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 20px;
            border-radius: 22px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .bet-input-group {
            margin-bottom: 16px;
        }

        .bet-input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bet-input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #14141e;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border 0.3s ease;
        }

        .bet-input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(230, 126, 34, 0.2);
        }

        button.action-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(230, 126, 34, 0.4);
            filter: brightness(1.1);
        }

        button.action-btn:active {
            transform: translateY(1px);
        }

        .history-section {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .history-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .session-history {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .ses-box {
            background: #12121e;
            border-radius: 6px;
            padding: 6px 10px;
            display: flex;
            gap: 3px;
            border: 1px solid var(--surface-border);
            min-width: 70px;
            justify-content: center;
        }

        .bet-list {
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 6px;
        }

        .bet-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dotted rgba(255,255,255,0.05);
        }

        .bet-row span:first-child { color: var(--text); }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(26, 26, 36, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification.show { transform: translateX(-50%) translateY(0); }
        .notification.success { border-color: var(--accent); color: var(--accent); }
        .notification.error { border-color: var(--danger); color: var(--danger); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .win-effect { animation: pulse 0.6s infinite; }

        .result-section {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        .result-dice-grid {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-top: 8px;
        }
        .result-box {
            background: #12121e;
            padding: 10px;
            border-radius: 10px;
            width: 32%;
            text-align: center;
            border: 1px solid var(--surface-border);
        }
        .result-box .emoji { font-size: 2rem; }
    </style>
</head>
<body>

    <div id="notify" class="notification"></div>

    <header>
        <h2>🎲 BẦU CUA TÔM CÁ</h2>
        <div class="balance-card">
            <span class="label">Số dư:</span>
            <span class="value" id="balance">Đang tải...</span>
        </div>
    </header>

    <div class="eight-d-container">
        <div class="plate-base">
            <div class="dice-area" id="dice-items">
                <div class="dice">❓</div>
                <div class="dice">❓</div>
                <div class="dice">❓</div>
            </div>
        </div>
        <div class="bowl-top" id="bowl"></div>
    </div>

    <div class="grid">
        <div class="card" onclick="selectItem(this, 'bau')">
            <span class="icon">🎃</span>
            <div class="name">Bầu</div>
        </div>
        <div class="card" onclick="selectItem(this, 'cua')">
            <span class="icon">🦀</span>
            <div class="name">Cua</div>
        </div>
        <div class="card" onclick="selectItem(this, 'tom')">
            <span class="icon">🦐</span>
            <div class="name">Tôm</div>
        </div>
        <div class="card" onclick="selectItem(this, 'ca')">
            <span class="icon">🐟</span>
            <div class="name">Cá</div>
        </div>
        <div class="card" onclick="selectItem(this, 'ga')">
            <span class="icon">🐔</span>
            <div class="name">Gà</div>
        </div>
        <div class="card" onclick="selectItem(this, 'nai')">
            <span class="icon">🦌</span>
            <div class="name">Nai</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="bet-input-group">
            <label for="amount">Số tiền đặt cược (VNĐ)</label>
            <input type="number" id="amount" value="10000" min="1000">
        </div>

        <button class="action-btn" id="bet-btn" onclick="placeBet()">Đặt cược ngay</button>

        <div class="result-section" id="result-section">
            <div class="result-title">
                <span>Kết quả xúc xắc:</span>
                <span id="result-status"></span>
            </div>
            <div class="result-dice-grid" id="result-grid"></div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">
            <span>🎲 Lịch sử phiên gần đây</span>
            <span>Cược đã lưu</span>
        </div>
        <div class="session-history" id="session-log">Chưa có dữ liệu</div>
    </div>

    <div class="history-section">
        <div class="history-title">
            <span>📝 Lịch sử cược của bạn</span>
        </div>
        <div class="bet-list" id="bet-log">
            <div class="bet-row"><span>Chưa có cược nào</span><span>-</span></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let selectedItem = null;
        let userId = tg.initDataUnsafe?.user?.id || 123456; 

        const iconMap = {
            'bau': '🎃', 'cua': '🦀', 'tom': '🦐',
            'ca': '🐟', 'ga': '🐔', 'nai': '🦌'
        };
        const nameMap = {
            'bau': 'Bầu', 'cua': 'Cua', 'tom': 'Tôm',
            'ca': 'Cá', 'ga': 'Gà', 'nai': 'Nai'
        };

        let sessionHistory = [];
        let userBetHistory = [];

        function showNotification(message, type = 'success') {
            const notify = document.getElementById('notify');
            notify.innerText = (type === 'success' ? '✅ ' : '❌ ') + message;
            notify.className = `notification show ${type}`;
            setTimeout(() => {
                notify.className = `notification`;
            }, 3500);
        }

        window.onload = async function() {
            try {
                let response = await fetch(`https://shanghai-boom-missouri-gordon.trycloudflare.com/get-balance?user_id=${userId}`);
                let data = await response.json();
                if (data.success) {
                    document.getElementById('balance').innerText = data.balance.toLocaleString() + 'đ';
                } else {
                    document.getElementById('balance').innerText = '0đ';
                }
            } catch (error) {
                document.getElementById('balance').innerText = 'Lỗi kết nối';
            }
        };

        function selectItem(element, name) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedItem = name;
        }

        async function placeBet() {
            let amount = document.getElementById('amount').value;
            if (!selectedItem) {
                showNotification('Vui lòng chọn linh vật!', 'error');
                return;
            }
            if (!amount || amount <= 0) {
                showNotification('Số tiền không hợp lệ!', 'error');
                return;
            }

            const btn = document.getElementById('bet-btn');
            btn.innerText = "Đang quay...";
            btn.disabled = true;

            // Hiệu ứng nhấc bát 3D (Lắc)
            const bowl = document.getElementById('bowl');
            bowl.style.transform = "translateY(-45px)";
            
            try {
                let response = await fetch('https://shanghai-boom-missouri-gordon.trycloudflare.com/place-bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'place_bet',
                        item: selectedItem,
                        amount: parseInt(amount),
                        user_id: userId
                    })
                });

                let data = await response.json();
                
                // Trả bát xuống
                setTimeout(() => {
                    bowl.style.transform = "translateY(0px)";
                }, 800);

                setTimeout(() => {
                    btn.innerText = "Đặt cược ngay";
                    btn.disabled = false;

                    if (data.success) {
                        document.getElementById('balance').innerText = data.balance.toLocaleString() + 'đ';
                        
                        // Lấy dữ liệu và cập nhật mảng
                        sessionHistory.unshift(data.result);
                        if (sessionHistory.length > 5) sessionHistory.pop();
                        renderSessionHistory();

                        userBetHistory.unshift({ item: nameMap[selectedItem], amount: parseInt(amount), result: 'Xử lý' });
                        if (userBetHistory.length > 5) userBetHistory.pop();
                        renderBetHistory();

                        document.getElementById('result-section').style.display = 'block';
                        let grid = document.getElementById('result-grid');
                        grid.innerHTML = '';
                        
                        let htmlContent = '';
                        data.result.forEach(item => {
                            htmlContent += `
                                <div class="result-box">
                                    <div class="emoji">${iconMap[item]}</div>
                                    <div class="label">${nameMap[item]}</div>
                                </div>
                            `;
                        });
                        grid.innerHTML = htmlContent;

                        let count = data.result.filter(x => x === selectedItem).length;
                        const statusSpan = document.getElementById('result-status');
                        if (count > 0) {
                            statusSpan.innerHTML = `<span style="color:var(--accent);">THẮNG (${count}x)</span>`;
                            showNotification('Chúc mừng bạn thắng cược!', 'success');
                        } else {
                            statusSpan.innerHTML = `<span style="color:var(--danger);">THUA</span>`;
                            showNotification('Chúc bạn may mắn lần sau', 'error');
                        }
                    } else {
                        showNotification('Lỗi: ' + data.message, 'error');
                    }
                }, 1000);
            } catch (err) {
                bowl.style.transform = "translateY(0px)";
                btn.innerText = "Đặt cược ngay";
                btn.disabled = false;
                showNotification('Lỗi kết nối máy chủ.', 'error');
            }
        }

        function renderSessionHistory() {
            const el = document.getElementById('session-log');
            if (sessionHistory.length === 0) { el.innerText = "Chưa có dữ liệu"; return; }
            el.innerHTML = '';
            sessionHistory.forEach(s => {
                let sHtml = `<div class="ses-box">`;
                s.forEach(it => {
                    sHtml += `<span>${iconMap[it]}</span>`;
                });
                sHtml += `</div>`;
                el.innerHTML += sHtml;
            });
        }

        function renderBetHistory() {
            const el = document.getElementById('bet-log');
            if (userBetHistory.length === 0) { el.innerHTML = '<div class="bet-row"><span>Chưa có cược nào</span><span>-</span></div>'; return; }
            el.innerHTML = '';
            userBetHistory.forEach(b => {
                el.innerHTML += `
                    <div class="bet-row">
                        <span>${b.item}</span>
                        <span>${b.amount.toLocaleString()}đ</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
