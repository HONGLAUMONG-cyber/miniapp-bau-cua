<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bầu Cua - Cỗ Máy In Tiền</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #e67e22;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 8px; }
        .balance { font-size: 1.1rem; color: #a0a0a0; margin-bottom: 24px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .card.active {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.3);
        }
        .icon { font-size: 2rem; margin-bottom: 8px; }
        .name { font-weight: bold; font-size: 0.9rem; }
        .bet-input {
            margin-top: 24px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .bet-input label { display: block; margin-bottom: 8px; color: #a0a0a0; }
        .bet-input input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            text-align: center;
            font-size: 1.1rem;
        }
        button.action-btn {
            margin-top: 32px;
            padding: 14px 28px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            transition: 0.2s;
        }
        button.action-btn:hover { background: #d35400; }
    </style>
</head>
<body>
    <h2>🎲 BẦU CUA TÔM CÁ</h2>
    <div class="balance">Số dư: <span id="balance">Đang tải...</span></div>

    <div class="grid">
        <div class="card" onclick="selectItem(this, 'bau')">
            <div class="icon">🎃</div>
            <div class="name">Bầu</div>
        </div>
        <div class="card" onclick="selectItem(this, 'cua')">
            <div class="icon">🦀</div>
            <div class="name">Cua</div>
        </div>
        <div class="card" onclick="selectItem(this, 'tom')">
            <div class="icon">🦐</div>
            <div class="name">Tôm</div>
        </div>
        <div class="card" onclick="selectItem(this, 'ca')">
            <div class="icon">🐟</div>
            <div class="name">Cá</div>
        </div>
        <div class="card" onclick="selectItem(this, 'ga')">
            <div class="icon">🐔</div>
            <div class="name">Gà</div>
        </div>
        <div class="card" onclick="selectItem(this, 'nai')">
            <div class="icon">🦌</div>
            <div class="name">Nai</div>
        </div>
    </div>

    <div class="bet-input">
        <label for="amount">Số tiền đặt cược (VNĐ)</label>
        <input type="number" id="amount" value="10000" min="1000">
    </div>

    <button class="action-btn" onclick="placeBet()">ĐẶT CƯỢC</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let selectedItem = null;

        // Lấy User ID của người chơi từ Telegram WebApp
        let userId = tg.initDataUnsafe?.user?.id || 123456; 

        window.onload = async function() {
            try {
                // Kết nối tới API Cloudflare Tunnel mới để lấy số dư
                let response = await fetch(`https://shanghai-boom-missouri-gordon.trycloudflare.com/get-balance?user_id=${userId}`);
                let data = await response.json();
                
                if (data.success) {
                    document.getElementById('balance').innerText = data.balance.toLocaleString() + 'đ';
                } else {
                    document.getElementById('balance').innerText = '0đ';
                }
            } catch (error) {
                console.error("Lỗi tải số dư:", error);
                document.getElementById('balance').innerText = 'Lỗi kết nối';
            }
        };

        function selectItem(element, name) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedItem = name;
        }

        async function placeBet() {
            let amount = document.getElementById('amount').value;
            if (!selectedItem) {
                alert('Vui lòng chọn linh vật trước khi cược!');
                return;
            }
            if (!amount || amount <= 0) {
                alert('Vui lòng nhập số tiền hợp lệ!');
                return;
            }

            try {
                // Kết nối tới API Cloudflare Tunnel mới để xử lý cược
                let response = await fetch('https://shanghai-boom-missouri-gordon.trycloudflare.com/place-bet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'place_bet',
                        item: selectedItem,
                        amount: parseInt(amount),
                        user_id: userId
                    })
                });

                let data = await response.json();
                if (data.success) {
                    alert('Đặt cược thành công! Số dư còn lại: ' + data.balance.toLocaleString() + 'đ');
                    document.getElementById('balance').innerText = data.balance.toLocaleString() + 'đ';
                } else {
                    alert('Lỗi: ' + data.message);
                }
            } catch (error) {
                console.error('Lỗi kết nối tới server:', error);
                alert('Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại!');
            }
        }
    </script>
</body>
</html>
